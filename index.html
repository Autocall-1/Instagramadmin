<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — LeadMachine</title>
  <link rel="stylesheet" href="assets/admin.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .login-box{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--edge);border-radius:var(--r2);padding:36px;animation:fadeIn .3s ease}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
    .logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:grid;place-items:center;font-size:16px;font-weight:700;color:#000}
    .logo-text{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px}
    .logo-text span{color:var(--accent)}
    .login-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:-0.5px;margin-bottom:4px}
    .login-sub{font-size:13px;color:var(--w3);margin-bottom:28px;font-family:'DM Mono',monospace;font-size:11px}
    .shield{text-align:center;font-size:11px;color:var(--w3);margin-top:20px;font-family:'DM Mono',monospace}
  </style>
</head>
<body>
<div class="noise"></div>
<div class="login-box z1">
  <div class="logo">
    <div class="logo-icon">👑</div>
    <div class="logo-text">LEAD<span>MACHINE</span></div>
  </div>
  <div class="login-title">ADMIN LOGIN</div>
  <div class="login-sub">// restricted area — authorized only</div>

  <div id="alert-box"></div>

  <form id="login-form">
    <div class="form-group">
      <label class="form-label">Admin Email</label>
      <input class="form-input" id="f-email" type="email" placeholder="admin@leadmachine.in" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="f-pass" type="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full" id="btn-submit">LOGIN →</button>
  </form>
  <div class="shield">🔒 Admin access only · Unauthorized attempts logged</div>
</div>

<div id="toast-area"></div>

<script type="module">
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // PASTE FIREBASE CONFIG
  const FIREBASE_CONFIG = {
    apiKey:"YOUR_API_KEY", authDomain:"YOUR_PROJECT.firebaseapp.com",
    projectId:"YOUR_PROJECT_ID", storageBucket:"YOUR_PROJECT.appspot.com",
    messagingSenderId:"YOUR_SENDER_ID", appId:"YOUR_APP_ID"
  };
  const app  = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // Redirect if already admin-logged-in
  onAuthStateChanged(auth, async user => {
    if (!user) return;
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists() && snap.data().is_admin) window.location.href = 'pages/dashboard.html';
  });

  function showAlert(msg) {
    document.getElementById('alert-box').innerHTML = `<div class="alert alert-error">${msg}</div>`;
  }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Verifying...';
    try {
      const cred = await signInWithEmailAndPassword(auth,
        document.getElementById('f-email').value.trim(),
        document.getElementById('f-pass').value
      );
      // Verify admin role in Firestore
      const snap = await getDoc(doc(db, 'users', cred.user.uid));
      if (!snap.exists() || !snap.data().is_admin) {
        await auth.signOut();
        throw new Error('You are not authorized as admin.');
      }
      window.location.href = 'pages/dashboard.html';
    } catch(err) {
      showAlert('❌ ' + (err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found'
        ? 'Invalid credentials.' : err.message));
      btn.disabled = false; btn.textContent = 'LOGIN →';
    }
  });
</script>
</body>
</html>
